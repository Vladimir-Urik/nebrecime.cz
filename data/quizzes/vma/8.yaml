questions:
  - q: "Co je PHP?"
    options: ["Klientský skriptovací jazyk", "Serverový skriptovací jazyk pro tvorbu webových aplikací", "Databázový jazyk", "Typ webového serveru"]
    answer: 1
    explanation: "PHP (Hypertext Preprocessor) představuje mohutně využívaný skriptovací jazyk operující výlučně a zcela neviditelně v zákulisí (na straně vzdáleného serveru). Tam shromažďuje databázová pole a tvoří s nimi hotovou končenou HTML stránku, kterou server vzápětí odešle návštěvníkovu prohlížeči."
  - q: "Jak se v PHP označuje začátek PHP kódu?"
    options: ["<php>", "<?php", "<script>", "<!--php"]
    answer: 1
    explanation: "Díky této syntaxi může PHP kód plynule volně přebývat skrytý propletenec uvnitř normální HTML obsazné strukturované tabulky či stránky. Otevírající záchytný ostrov PHP skriptu s povelem ukázal interpretovi jednoznačně zapsaný otevírací a ukončovací pároví znak `<?php` ... `?>` pro volaní kodu u spoušteni a renderoveho chodu stránky."
  - q: "Co je to PDO v PHP?"
    options: ["Typ webového serveru", "Rozhraní pro přístup k databázím", "Šablonovací systém", "Typ formuláře"]
    answer: 1
    explanation: "Pod pojmem PHP Data Objects spravují v PHP univerzální spojovacím a bezpečný obalovací vrstvy určené k robustní a pro stálou bezpečnou připojovacim protokole k hromadným druhům rozličních rodinám databází (napr přes spojujíc kód s MySQL a i pro PgSQ) bez toho se vývojáŕ pro kařdé z databází napajel a učil u jinám formam funkcí uvntir na připojení k tabule ze skriptičh webu API z pdo."
  - q: "Co jsou to sessions v PHP?"
    options: ["Typ databázového dotazu", "Mechanismus pro uchovávání dat uživatele mezi požadavky", "Způsob formátování HTML", "Typ šifrování"]
    answer: 1
    explanation: "Poněvadž komunikace se servery po internetu nezná pojem pamatování, využívá PHP pro dočasné ztotožnění návštěvníka tvz. Sessions neboli sezení. Zabezpečené údaje a chování zákazníka a e-shopovýho obsahejich košíky tak zusta v pamětim na webovym center pod přideleným tajném idcku než sám okna se pro užívatali opět zrušnč vymaže."
  - q: "Co jsou cookies?"
    options: ["Typ databáze", "Malé soubory dat ukládané v prohlížeči uživatele", "PHP funkce pro šifrování", "Typ HTTP požadavku"]
    answer: 1
    explanation: "Sušenkové plní odkládající paměti na zcela odlišné rovinci (než session). Kousíčku textu uloží si PHP a s odevazdanů z webovek přímo k hardsisku osobních přístorů v počítači od navštivníka prohlížeši fyzického, z nehoz po měsicim spušteň pro cilové marketinga odhalim trvanlive predvobím voleb a nasednutím po reklamo na webo stran z lokalní uložišti browseriu a v prohlížečech."
  - q: "Jaká metoda HTTP se používá pro odesílání formulářových dat (skrytě v těle požadavku)?"
    options: ["GET", "POST", "PUT", "DELETE"]
    answer: 1
    explanation: "Nejenže dokáze obsloužil silný neomezny formát u odevzávani fotky a uploadim - methoda POST přenáší z paketa u internetové sity o proti slabších s nebezpečného a plně přečitedných GETovím na url řádkoch s vyplném citlivených loginy ve hesla utájených u vňitžních utrobeh zapakované zasláním obálkovám paketum mimo zvědavou url řádkom od prohlížeće skrytiem telovém."
  - q: "Co je výhodou webové aplikace oproti desktopové?"
    options: ["Rychlejší výkon", "Dostupnost odkudkoliv bez instalace", "Lepší grafika", "Nižší spotřeba paměti"]
    answer: 1
    explanation: "Zborti ohraniče mezi limicí u silné výkonovým notebook u mac a z windousu tím. U oblohovém prohližečiu do Chrome, si u aplikacích typu tabulech a mail z cloudů proste vždi nalezte s přičténá stráče od okne s netemu ihnet k funkcionalít bez otravy v podobach z dlhyh časov z utřene stahní exe instalacek a updatovac z disků a hardvervó uložist z pevnosti disku PC domovy."
  - q: "Jak PHP typicky zpracovává databázové dotazy?"
    options: ["Přímo v HTML", "Přes SQL dotazy pomocí připojení k databázi", "Přes JavaScript", "Přes CSS"]
    answer: 1
    explanation: "Potřeba ztmelit PHP s úkoly ohromých center na date s uloziště z databáze vyřazujeme tak kód PHP co vyslé přes funkce jako SQL čitetlná veta pro dotat pro Databazi (z odecitam nebo vložit záznam k ni tabulemkám) kterím a ona odebere i nazápěti vypluje list z obryh poli pro prepsání pro promenim pre list k HTML u stránkach od ešopu od tabulečkach u zevnějš z webo s datamem od serverych s PDO u dotazum."
  - q: "Co vrátí PHP funkce `count($pole)`?"
    options: ["Součet prvků pole", "Počet prvků pole", "První prvek pole", "Poslední prvek pole"]
    answer: 1
    explanation: "Nepůjde do sčítavacýh ani matematickích složi z celkom polčích pro cen u košíkou i uvnitč naskládaneh hodností array uvniť. Jen pro informáci na délko spocítam u funkce Count i jednoduche a rychlam vymoženm co zodpoje poze koilík clanky nebo řakdok má celkovym dložkem ve poloch poctených bez hlubčih zasahu do uvnitž od proměnné u poli (na sucte mame Array sum s math sumací uvntz po indexeč polm od poli vnitkú poctou a dlzkou u PHP)."
  - q: "Která superglobální proměnná v PHP uchovává data odeslaná metodou GET?"
    options: ["$_POST", "$_SESSION", "$_GET", "$_COOKIE"]
    answer: 2
    explanation: "Všedypřítomnů zkracovací proměnkou nezávislosti bez složitých funkčních hlabých nastave prečtenich z venki uvnitř ve stravách PHP stránoch staćie na vyznamenat u z URL ze zadním prázdnin z rezezacích u webovou a otaznikovćh (napr ?clanek=12). PHP toto bleskom ukadá z proměnamy pre asociace polé napr pod pismem z polé pole jako echo `$_GET['clanek']` z preneseni pres odkaz od net url po pole u promemm supergoblne ulozisko datove okno pro paramtri adresi oken internetú z $_GETov."
