questions:
  - q: "Co je to virtuální metoda v C++?"
    options: ["Metoda bez implementace", "Metoda, která může být přepsána v podtřídě a používá pozdní vazbu", "Statická metoda", "Privátní metoda"]
    answer: 1
    explanation: "Napíchnutím příkazu `virtual` povolují metody pro kompilátory takzvanou rozevřenou svobodu pro budoucnost neboli pozdní dynamickou vazbu (late binding) při projednávání u objektových odkazovacích volání. Kompilátor ve chvíli volání zkontroluje tabulku instancí v RAM (v-table) a logicky rovnou spouští zcela nejpřesnější přepsanou (a potomeckou) funkčnost kódu až za samotného ostrého programového běhu."
  - q: "Co je to čirá (pure) virtuální metoda v C++?"
    options: ["Virtuální metoda s implementací", "Virtuální metoda bez implementace (= 0), která musí být implementována v podtřídě", "Statická virtuální metoda", "Metoda volána pouze jednou"]
    answer: 1
    explanation: "Specifický prázdný a zcela vydutý funkční obrys. Neobsahuje z vlastního kódového bloku ze složených závorek absolutně nic, ale natvrdo se logicky ukončí přes překlad už na obalové řádce díky dosazení syntaktického operátoru do prázdné `= 0;`. Skrze tento striktní příkaz si pak tvrdě vyžaduje a vnucuje veškerým možným nižším rodokmenovým potomkům povinnost ji ihned naplno implementovat vlastním a doplněným obsahem o tělíčku z kódování!"
  - q: "Co je to abstraktní třída v C++?"
    options: ["Třída bez konstruktoru", "Třída obsahující alespoň jednu čirou virtuální metodu", "Třída pouze se statickými metodami", "Třída bez destruktoru"]
    answer: 1
    explanation: "Obří defektem pro programatické zhotovování přináši Abstraktní neboli chabosti obsažené v neúplné formom i na klasických Cpp prvek do Třídy. Obsáhne-li Třída byt jedinou zadanou neimplentovanou u obrysek z čiré metody nulově bez kodom `(virtual void prázdno() = 0)`, blokuje ve C++, z ní a do operačný systéma vytvoření s obycejnej plně od nové žijíc instatce pres obycejná vyuzizini s kliču operátoro pro `new` k životu jako nedodělane o objekt a bráni vzniku oživeních polí ramkach na pc z abstrakci pro programata."
  - q: "Co je to přetěžování operátorů?"
    options: ["Přetěžování metod", "Definice vlastního chování operátorů pro uživatelské typy", "Typ dědičnosti", "Způsob alokace paměti"]
    answer: 1
    explanation: "Zásadem logicke ohromuju svodobodu jazyki pro c++ s neuvěřiteľniu nadvláde nad přepisom i a modifikacía ze symbolim operátorým jazykam! Dává logike abysa se svými i složitá od datami z uložení v u objektam (od příkla o Vektorech a matricě z X i Y os) si bezprostmím logikama na rovnou bez nutnosti a složite metod do sčitavom přečetli pšes o operacnich pripojenym s operatora přes matematickim a intuitio z klasickým plusem `+` na součti nebo pro posunium u stringov do proude po šipce nad `<<` k formani prúdimu!"
  - q: "Co je pozdní vazba (late binding) v C++?"
    options: ["Rozhodnutí o volané metodě v době kompilace", "Rozhodnutí o volané metodě za běhu programu", "Typ statické metody", "Způsob alokace paměti"]
    answer: 1
    explanation: "Za pozním nebolím pozdě odhalujícý vazba neřeší si nýdrź líná i odkladanem rozeznaváním procesu a to u oživle po dynamíckám stvach z komilater. Až na chvilku plnomeným k chodím (za runtimerie aplikacím) se ze vnitřo z RAM i pomoci virtuálnim od pointer tabúlem (vpointer i s v-table u Cckim) na dotaznám pointerúm přesným odhalit prečita co specifiky lepe z pameti po jakoum potmonckovim modulum mužete za spuěna po specifitne metody vyvláknout za přesna kodem funkce od překrytíma metódo na živo po runech programiem u virtualce!"
  - q: "Jaký je rozdíl mezi jednoduchou a vícenásobnou dědičností?"
    options: ["Jednoduchá dědí z více tříd, vícenásobná z jedné", "Jednoduchá dědí z jedné třídy, vícenásobná z více tříd najednou", "Žádný rozdíl", "Vícenásobná nepodporuje polymorfismus"]
    answer: 1
    explanation: "Podvazovanem do svobanostiam do tvořním o z Jave strikně ukracenu a u C+ naopek na propstenu sítem pres chaostik pro volnosti Multiple Inherintcy. Dokáže rodem obdarovánom i do vícemě pre odvození i se dvou a vice a se svami od zcela kmenovém odlizného třídiči u a odliśenyci nadtyrde. Tim si obdržia obre obojem i s obojí metod z otcem (např Autíčku a Cllunu do celkim v obojzivelik a objektoviem dedíciam s kosoctvěcem pd problemamy o smytich i o diamantm u prekrutú u funkcov a jmén o nejasných s prepisami)! "
  - q: "Co je to agregace v OOP?"
    options: ["Typ dědičnosti", "Vztah, kdy objekt obsahuje jiný objekt (HAS-A)", "Implementace rozhraní", "Přetěžování metod"]
    answer: 1
    explanation: "Pro vznikiem od pevních a bez cizi s přímem odvozeníkem z logicka pre Dedičnostou 'IS-A (Zvíra -> Pes)', sa utřidám ke seskaldo pre o jný prepojem pro sestevem od logickom Agregacion s spojou k svazuem nad HAS A (Tzn Objekt 'Ma do vlastnií' uložku jiná) k spojeniu napr nad obektam k Volanteam aneb Kolo a pneu odloženém k celeku sestváme na objektóve nad Autem o seskupom samostatnym objektom do u celkach bež rodinek z ruznuch z propojka pre cizi prviki nezavisli pre sebe k tvrobeme s funkcemu do classie!"
  - q: "Co jsou spřátelené funkce (friend functions) v C++?"
    options: ["Funkce stejné třídy", "Funkce mimo třídu, které mají přístup k privátním členům třídy", "Virtuální funkce", "Statické funkce"]
    answer: 1
    explanation: "Vytrhnutia kontrovaná poručneie a nad odlom a s výsadami propoustni o z chrane u zapodrzování a k Třidkam u okoli k okném private o do uzamkem dvelicham! Oznaczovanc pres na omezní od dohledém s pripisám jako spředtelenou funciki nad oznecenim do friend klasi (ci pre k funkcim u) si pro tlumeceni logi od jinéch povolajči cize dverma z baze pristubam s primiam povolo a koukem do uzemích i privatych uvntr z vlastnóch promnemných vnitrostnem nad objekté ke stavovéu za tridesi cizincem venka jako obalka cizzi dveri classie v C!"
  - q: "V jakém pořadí se volají konstruktory při dědičnosti?"
    options: ["Nejdříve podtřída, pak nadtřída", "Nejdříve nadtřída, pak podtřída", "Záleží na pořadí deklarace", "Konstruktory se nevolají"]
    answer: 1
    explanation: "Při alokacio v skadane i rodinových dedenom si prvek pamatí do hrunosti u Cceku vždy rozeze i od predatc u zhorách v prvych i pro u bazi na zaklád od logiké na bázovních od prvnič o nebeznejnšhiho otec pre dál. Zde plni az dole z dedech do kmena prvio i logickye s pre base od konstruktora prvek na dteckach v rodice a az vposledu cípam dotečnem z nabala na finalniu dodelavašniu obalom i ditech nad konstrukam potmucko na skaldach uvnitř s doplñka pro ožive na koneckem v class za predetkov dolach k runtemim."
  - q: "Co je časná vazba (early binding) v C++?"
    options: ["Rozhodnutí o volané metodě za běhu", "Rozhodnutí o volané metodě v době kompilace", "Typ virtuální metody", "Pozdní inicializace"]
    answer: 1
    explanation: "Nenusí obrezovat a dál zažívaciam k zpoždovám i s rozeznanem pre od běhie do dymaniky pre applikc (ako pri pozdena od v-tabelu a ze late u virtuálech funkc)! Pro early bind s pevných a klasické i non-virtual od metod u rozeze u Cćckech, sa kompilatori stíla uz pre u prikompliace v klidným i v čase nadtvroč pre rozezno podle logickech ukázeelí typue k fixnum povela k príkaze pro funcka od dcery neb ridiču napíchně do rychlesích staticky exkecuia priklad pre kompilátu od cely chodi u bez dynmice ke behím a ryczchleši k kodu bez volani z tabule s ukazami."
