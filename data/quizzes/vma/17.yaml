questions:
  - q: "Co je to ukazatel (pointer) v C++?"
    options: ["Typ pole", "Proměnná uchovávající adresu v paměti", "Typ výčtu", "Způsob dědičnosti"]
    answer: 1
    explanation: "Kouzelná a v céčku klíčová zbraň neuchovává zapsanou vlastní konkrétní hodnotu jako číslo 10,  nybrž je směrovací cedulka naskrz pamětí fyzické RAM - pouhá adresa na místo, kde daná desitka až bydlí."
  - q: "Jaký operátor vrátí adresu proměnné v C++?"
    options: ["*", "&", "->", "::"]
    answer: 1
    explanation: "Prefixní Ampersand (zkroucené &) funguje pro referenční mapy u pointerů jako zjišťovač pošťácka polohy. Když do kódu napíšete `&pocet`, nevypíše vám, co číslo nese obsáh, jen lokalizuje šestnáctkový HEX kód pozice ve vašich tranzistorech (např. 0x00A)."
  - q: "Jaký operátor dereferencuje ukazatel (přistoupí k hodnotě) v C++?"
    options: ["&", "->", "*", "::"]
    answer: 2
    explanation: "Zatímco bez hvězdičky si pracujeme len s oním nudným mapovým adresátem (0x0A2B), operací přes předřazenou hvězdičku `*ukazatel` interpret odcestuje za adresu rovnou si vytáhnout nebo změnit ono měřítko a obsah skrývaného čísla."
  - q: "Co dělá operátor `new` v C++?"
    options: ["Kopíruje objekt", "Alokuje paměť na haldě (heap) a vrátí ukazatel", "Smaže objekt", "Inicializuje proměnnou"]
    answer: 1
    explanation: "Požaduje ze strany operačního softwaru počítače k vyhrazení nového bloku za chodu na nesymetrický větší volný paměti dynamických dat. A jako navrátnu stvrzenku do jazyka posílá rovnou pointer z umístění v hromadé (Heapu)."
  - q: "Co dělá operátor `delete` v C++?"
    options: ["Alokuje novou paměť", "Uvolní dynamicky alokovanou paměť", "Kopíruje paměť", "Inicializuje ukazatel"]
    answer: 1
    explanation: "Křehké nebezpečí pro zahození alokací od příkazu `new`. Na rozdíl od Javy obsluhovanou automatem si v surovém C/C++ uvolňuje pamět vždy len manuálně skrze slovo  `delete`. (U polích i `delete[]`)."
  - q: "Co je to dangling pointer?"
    options: ["Ukazatel na neplatnou nebo uvolněnou paměť", "Ukazatel na začátek pole", "Typ chytré paměti", "Ukazatel na funkci"]
    answer: 0
    explanation: "Smutné torzo visícího neověřeného nebezpečného ukazatele co mířil v kódu donedávna na cíl adresy - nicméně zrovna jeho cíl ze spoda kód někdo cizej už uvolnil/smazal přes delete. On tak sebedestrukční sahá po zakázané odjištěně vyhlazených starých sektorech oken pamětí."
  - q: "Jak se přistupuje k členu struktury přes ukazatel v C++?"
    options: ["ukaz.clen", "ukaz::clen", "ukaz->clen", "ukaz[clen]"]
    answer: 2
    explanation: "Klasická obyčejná struktura objektu používá puntiku (`.`). Avšak pokud v rutine nese do dlaně jen ukazovatel a musí přes dohlednout přes referenc na skok, používá slavný odkazový syntaktický klacík ze šipky `->` ."
  - q: "Co je to aritmetika ukazatelů?"
    options: ["Šifrování adres", "Posouvání ukazatele o určitý počet prvků v paměti", "Kopírování ukazatelů", "Porovnání dvou ukazatelů"]
    answer: 1
    explanation: "Aplikováním sečítání o 1 k pointeru (třeba u integer dat z 4 Bytů obsahu) neprovedu operace matematickou do jedničky na adresu, ale přesně ho to poskočí o přesné hraničící čtyř-bytové posuny od typu až na tělo následijícho dalšího objektku v obřím políčkách."
  - q: "Co je NULL pointer?"
    options: ["Ukazatel na první prvek pole", "Ukazatel neukazující na žádné platné místo v paměti", "Ukazatel na funkci", "Typ chytré paměti"]
    answer: 1
    explanation: "V dřívější dobe deklarovano čistou prázdnou 0 přes znak `NULL` (Dnes v C++11 lépe obsluhovaní silnějśím prvkem typovanou nulu klíčovým sloven `nullptr`), symbolitzujic mrtvej odkaz co mírí absolutně legálně 'do bezpečně bezcestného prázdna'."
  - q: "Jak se deklaruje ukazatel na celé číslo v C++?"
    options: ["int& p;", "pointer<int> p;", "int* p;", "ref int p;"]
    answer: 2
    explanation: "Datový příznak s postranně odrazenou za hvězdičkou určuje, že nepůjde přímo o hodnotove naplěnné uložky ve vlastnění proměnnce. Definice logiky `int *` označí že pointer očekává odkazovát se jen čisté obvody s celými inty čislicí."
