questions:
  - q: "Jaká je funkce procesoru (CPU)?"
    options: ["Ukládání dat na disk", "Zobrazování obrazu na monitoru", "Provádění výpočtů a řízení ostatních komponent", "Napájení počítače"]
    answer: 2
