questions:
  - q: "Co je to databáze?"
    options: ["Program pro editaci textu", "Organizovaná kolekce strukturovaných dat", "Typ operačního systému", "Síťový protokol"]
    answer: 1
    explanation: "Databáze je speciálně naprogramovaný systém ústředního informačního obřího trezoru neboli sběrnice. Primárně byl vymyšlen a vytvořen k bezpečnému udržování ohromitánského bloku všech strukturovaných záznamů za sebe do přehledných i organizovaných polí a usnadňuje gigantické milisekundové rychlovýběry lepším algoritmem, než prachobyčejné pomalé hledání přes zmatečnou hromadu volných otevřených textových sešitů v obyčejném obyváku."
  - q: "Co je to SŘBD (DBMS)?"
    options: ["Programovací jazyk", "Software pro správu a přístup k databázi", "Typ databázového modelu", "Zálohovací systém"]
    answer: 1
    explanation: "Data Base Management System čili česky 'Systém řízení báze dat'. Typickými představiteli robustních SŘBD rozhraní programů jsou velikáni trhu jako MySQL server anebo Oracle. Pozor, neoznačují svými jmény jenom samotná ležící uložená data na serverové síti – ukrývají pod obalem taktéž ten zprostředkovávací programový ochranný motor u oken i ten, co logicky v pozadí dál komunikuje a odesílá transakce na ty skutečné hliníkové vrstvy uležených pevných disků."
  - q: "Jaký databázový model je dnes nejrozšířenější?"
    options: ["Hierarchický", "Síťový", "Relační", "Objektový"]
    answer: 2
    explanation: "S velkým dominantním napětím neomezené spolehlivě ukotven do zemského jádra se na absolutně stálém i dominujícím obřím podílu usídlil právě takzvaný 'Relační (SQL) model'. Vynalezl efektivní a velice přehledně logickou dvojrozměrnou mřížovou cestu skrze rozestavených i vzájemných zafixovaných cizích provazbou oddělených poličkach i záznamových stéblic a se sloupčíky rovnou do propojených přehledně uspořádaných strukturovanách databázovych sítě tabuleček."
  - q: "Co je to entita v databázovém modelování?"
    options: ["Typ databázového dotazu", "Objekt reálného světa, o kterém ukládáme data", "Vztah mezi tabulkami", "Typ indexu"]
    answer: 1
    explanation: "Návrháři z oboru nad architekturou za SQL programování čerpají ze zastupující a klíčem modelovaných věci do pojmenování takzvaného pojetí Entita (z angl. za 'předmět' do zrcadové existence čehokoliv z dýchavé či obratové reality od světa a byznysů – např. pro tabulku s předměty faktur a u zaměstnače persony či zboží), čím u kódových těl a v zacílení pro tabulkovou formy s hlavičkama rovnou vymezují cíl zaměřených prác v SQL modelkách u návrhech s evidencích bázov."
  - q: "Co jsou atributy entity?"
    options: ["Vztahy mezi entitami", "Vlastnosti/charakteristiky entity", "Typy databázových dotazů", "Typy primárních klíčů"]
    answer: 1
    explanation: "Atribut se z překladů pojmů považuje ve vývojových roviních v SQL tabulkách za sledovaného dílka vlastností konkrétnější specifikace od konkrétně daného tvora (Entity), třeba u databázky pro u 'Zákazníkova okruhu' – např. jeho rodné sledovací jméno, unikátní barva vozu či počet dětí se promění pak u relačního návrháře pod jménem sloupečkových názvovejch hlaviček napasovaných přes sloupec od SQL programovací databázi k tabulkách jako formát atributum."
  - q: "Co je to primární klíč v relační databázi?"
    options: ["Šifrovací klíč", "Jedinečný identifikátor záznamu v tabulce", "Typ indexu", "Cizí klíč"]
    answer: 1
    explanation: "Každičký jednotlivý oddělený řádek ve spletité strukturované obci a od obydlní do SQL relační tabulky se z bezpečností pro bezchybné ztotožením (do propojení pre dál) absolutně nesmí navzájem propleíst čí přemodifikoval do duplicitě. Neomylný, automatický jedinečný identifikační ukazatelský štítek pro číslo (ID) za sloupec (klíč) pro to obstarává a chrání kód k neopakovatelného a vždy přisouděnou číslicem jediněčně na RČ u obyvatele nebo číselného z ID autoIncrementem pod u rozeznavatela 'PK' čí Primeryho Keye."
  - q: "Co je to cizí klíč (foreign key)?"
    options: ["Šifrovací klíč databáze", "Atribut odkazující na primární klíč v jiné tabulce", "Záložní primární klíč", "Typ indexu"]
    answer: 1
    explanation: "Jelikož databází provazujeme bez chaotického ukládaních stejnojímaných dat u duplicit např ve dvou jinách a i ruznych tabulků s poliam se jménem k jedním pro obchůzi tak odkazem slupkujeme přes Cizincového Klíče u Foreign-Key. A veškorou občas dál od oddelenci presně na specický vazbové pro Primárny KLíč dál čili slupcem jen ukázem 'Mám tady ID z Useru z tabule pro uzivetly' bez ukládani pro stejnamou osobo opkavániam jmenom dál do relačního bloku pre klíč provaznćh vztauhom do chraneni na FK logikiem dat! "
  - q: "Co zajišťuje integrita dat v databázi?"
    options: ["Šifrování dat", "Správnost, konzistenci a platnost uložených dat", "Rychlost přístupu", "Zálohu dat"]
    answer: 1
    explanation: "V obřim softwerio za hlídajícím SQL z DBMS rozhrenenim obránů brání před katasfrofu pre chybujim po logicky defetnim uživalú i o programu (přes constraints k mantinelo s omezeni v klíčúv a z tranzskoci), tim by abychom systemum obstaráli naprs nedeletil i uzvatelom od s vazanym jmeny na ucte nebo chybovi bez pradznoty či duplicitom pri narusenu ze logikam s celkovovou správmostum nad datamy v ramco u pevností pre datovou pro integritní k ošetrenim na sprave neposkreninym a pres platnym záznamo do konzuistence pre tabli v db."
  - q: "Co je MySQL?"
    options: ["Programovací jazyk", "Open-source relační databázový systém", "Typ NoSQL databáze", "Webový server"]
    answer: 1
    explanation: "Slavný do legendary rostuci od zdarme s otevrenyma (open-source) system ze software k backendovym slúžeb o relancich pro databaze u SQL stredou (z DBMS). Z rokem se v sítem pro malách i velkopodniku provazal s bezvadno od propojovaćum na velke spravou a internetu k prenostmu přes napr PHP uzli co na točíc z obří dominantným casta ke světou IT k u drzení si sprostřeho chovánu s robustim datovi po webách do dnéšny."
  - q: "Co je to persistance dat?"
    options: ["Šifrování dat", "Trvalé uchování dat i po ukončení aplikace", "Rychlost zpracování dat", "Způsob zálohy"]
    answer: 1
    explanation: "U slova pre anglickam prevzato se o trvalo z 'Persistence' nazýváme v programování u dat za trvalu do pevnotách i uchovnem ukladanam mimo nezavisost RAM paměť u prchamosti k programach blesku z pre chodo co na vnikne u programio, pre persisne o neznisene i po restártiu PC od programova u stavam i na od file diskym k o pevnych stavov pre dbčkach na logicke po file serverym disky i zachovem pre dotozum dál."
