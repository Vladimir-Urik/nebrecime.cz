questions:
  - q: "Jaké jsou tři základní pilíře objektově orientovaného programování?"
    options: ["Kompilace, linkování, spuštění", "Zapouzdření, dědičnost, polymorfismus", "Proměnné, funkce, třídy", "Alokace, inicializace, destrukce"]
    answer: 1
    explanation: "Celá složitá koncepce objektově orientovaného vývoje stojí na třech neotřesitelných obeliscích architektury - na pečlivé ochraně ukrytých lokálních vnitřností instance zvané Zapouzdření (Encapsulation), na síle sdíleného odkazu k novým potomkům přes Dědičnost (Inheritance) a nakonec ve schopnosti logického měnění forem a těl za dynamiky chování objektu jako Polymorfismus."
  - q: "Co je destruktor v C++?"
    options: ["Speciální metoda volaná při vytvoření objektu", "Speciální metoda volaná při zániku objektu", "Metoda pro kopírování objektu", "Statická metoda třídy"]
    answer: 1
    explanation: "Zanikající a finální záchranná procedurální fáze, která nese vždy stejný název jako samotná mateřská třída, leč uvozena a ohlašována na dálku symbolem vlnovky (`~NazevTridy`). Provádí klíčové instrukce a aktivně odpojuje např. zamknuté proudy externích otevřených datových files a souborů před samotným odhlášením (a finálním uvolněním pomocí `delete` z paměti operáků na C++ stroji)."
  - q: "Jak se v C++ deklaruje třída?"
    options: ["struct MojeTrida {}", "object MojeTrida {}", "class MojeTrida {}", "type MojeTrida {}"]
    answer: 2
    explanation: "S pomocí vyhrazeného slova se pro budování i u nejskrytější ochranné kmenové třídy do kódu zavolá typický začátek `class`, provázen ze svého vzniku i z objemného blokování skrze složené párové závorky `{}`. Podstatnou povinností o níž nezkušení zapomínají vkládat za složenou objímku definici se musí s C++ nezvykle do konce připojovat pevně uzavřený klasický osamělý zápisový středník."
  - q: "Co je to `this` ukazatel v C++?"
    options: ["Ukazatel na nadtřídu", "Ukazatel na aktuální instanci objektu", "Statická proměnná třídy", "Typ výjimky"]
    answer: 1
    explanation: "Skrytě a pro klid programátora podvazany pointer generující vždy jedinečnou adresu té právě aktuální obsluhované instance, uvnitř které se exaktně zrovna probíhá v metodě výkon. Zapisuje se s šipkou coby `this->` a odlišují se tak spolehlivě parametry funkcí např. vůbec neřízené a zduplikované do stejnojmenných vlastností tříd bez záměny dat (proměná z lokálu např vs lokálně)."
  - q: "Co jsou `const` metody v C++?"
    options: ["Metody, které nelze volat", "Metody, které nemění stav objektu", "Statické metody", "Metody bez parametrů"]
    answer: 1
    explanation: "Silný smluvní vzkaz překladači slíbené napravo v ocase ihned za závorkami k hlavičkové funkce modifikátorem `const`. Programátorská garance zajišťující chování obalové metody do pasivně jen-čtecího ('read-only') modulu. Jakékoli prohřešky uvnitř (i pouhé zkoušením přepisům lokálních objektovích soukromy proměnnich pre oběktovou inštancu stávů) ihned utnem v překladu kompilár prohřešskům errorem o zastávku."
  - q: "Co je zapouzdření (encapsulation) v OOP?"
    options: ["Dědění vlastností z nadtřídy", "Skrytí implementačních detailů a řízení přístupu k datům", "Polymorfismus", "Přetěžování operátorů"]
    answer: 1
    explanation: "Chytré a moudře definované oddělení s bezpečí o softwaru instnací od bezmocném cizím přímám nabahovani po atributechi objektum z veřjenej sféry – zamezuji si u objektách na private skrývači k uzamykáni. Okno logíckeho bezpečí otevrou programtorm po jedinum kanalu i se smlovanou provérce u vnějším ovládacími madlích s takýze rozhranimi bezpečně z kontrolních pro getry i verejni setterou u public funkci z api class obaly."
  - q: "Jaký je rozdíl mezi `class` a `struct` v C++ z hlediska výchozí přístupnosti?"
    options: ["Žádný rozdíl", "class má výchozí private, struct má výchozí public", "class má výchozí public, struct má výchozí private", "struct nepodporuje metody"]
    answer: 1
    explanation: "Ačkoliv formálně se i pod archickou sktrukturou jazykem u c++ dají tvořit plnotučné objekty is metódam i proměnýmami jako u velčých a silných moderníh třídčh (Tzn s objectově chovanýmu chovem). Zásadní dělají sémantickou dělícı se linee v lenivém opomenutím definované – vše nepřidanom pro obla Tříd se skrýví zablokonovo pro ochranu do bezpeče Private, avsak ve Stukture si od pocatu od nepansah bez ostyhů i publici plne sdeluje k pro svetu pro verjne u publicku bez barier."
  - q: "Jak se přistupuje k členu objektu pomocí tečkové notace?"
    options: ["objekt->clen", "objekt::clen", "objekt.clen", "objekt[clen]"]
    answer: 2
    explanation: "U hmatatelného operovánia priamim instancoím k objektum pres referencie na zemskem o objekt v bloku z pamětim z pevnem promemny lokélné tvořící v class (tzn na tvrdo po zavedeni bez pointerou), zavolame o metódke pro i k datch přímym tečkem pro puntik (. a bez operátorsci pro šipky pouzíteho s dynamiçkim ukazateleam o alkoaciu z heep) ."
  - q: "Co se stane, když konstruktor není definován?"
    options: ["Program se zkompiluje s chybou", "Kompilátor vygeneruje výchozí konstruktor bez parametrů", "Objekt nelze vytvořit", "Destruktor se nevolá"]
    answer: 1
    explanation: "Obrovskám pomocnik v pozadim u c++ se stára lenivé překĺadeći stvořitelem! Kdiš úplne u lenivejšıch pogramarorom ani stihne pri definicá obajlu se zapsoväť pro specicke inicializača funkcie pro instancich s tvoreni pre konstrukotů, překládani se zachytí se pre prazno dopleñené na cisto defaultné pro syntetiku cistí prazna s nulovem pamaamtrima defaultnem 'Třída()' pro bezporuchovi u stvreni prazdné a nove zivutne instanciu s nečekanyem i pre odberem promem bez erroré kompieci."
  - q: "Proč vzniklo objektově orientované programování?"
    options: ["Kvůli rychlejší kompilaci", "Kvůli potřebě lépe modelovat reálný svět a znovupoužitelnosti kódu", "Kvůli menší spotřebě paměti", "Kvůli jednodušší syntaxi"]
    answer: 1
    explanation: "Odpověz i historické evolučnim posúnium pre softweri od u nekonečnim složitó nezastavovaným chaosmém spahjetích s kodam i procedum v rannem i z klasického a prosedalního C se zdůžnem pro cteni i údržba o kody presla o prímam proročti k logichech a k reialim pre tvořena samostatny s stvebník bloky – uzly a těliskčh objektom a Třidum pre propojovonh do maló z nezavéslym od logiek i vnitřnošti do lepšie modulácie chovanom ze strávy o pamatíi pro ruzná programí svete u velkich apkečciach."
